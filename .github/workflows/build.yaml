name: CI

on:
  push:
    branches:
      - "master"
  pull_request:
  workflow_dispatch:
concurrency:
  group:
    ${{ github.repository }}-${{ github.workflow }}-${{ github.event.number || github.head_ref || github.run_id || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }} with Java ${{ matrix.java }}
    strategy:
      fail-fast: false
      matrix:
        java: [ 8, 11, 17, 21, 25 ]
        os: [ ubuntu-24.04, ubuntu-24.04-arm,  macos-26, macos-26-intel ]
        exclude:
          - java: 8
            os: macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'
      - name: Verify baseline build
        run: ./mvnw -B verify -Dinvoker.skip=true --file pom.xml

  compatibility:
    name: Compatibility on Java ${{ matrix.java }} with EclipseLink ${{ matrix.eclipselink }}
    strategy:
      fail-fast: false
      matrix:
        java: [ 21 ]
        eclipselink: [ 2.7.16, 3.0.4, 4.0.9, 5.0.0 ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'
      - name: Verify compatibility matrix
        run: ./mvnw -B verify "-Declipselink.version=${{ matrix.eclipselink }}" --file pom.xml
